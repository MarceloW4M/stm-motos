version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    container_name: stm_nginx
    networks:
      - stm_network
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www/html
    container_name: stm_php
    networks:
      - stm_network
    restart: unless-stopped
    environment:
      - PHP_MEMORY_LIMIT=256M
      - PHP_MAX_EXECUTION_TIME=120
      - PHP_UPLOAD_MAX_FILESIZE=20M
      - PHP_POST_MAX_SIZE=20M
      # Variables de entorno para la aplicación y conexión a BD
      - DB_HOST=10.50.0.30
      - DB_PORT=3406
      - DB_NAME=stm_taller
      - DB_USER=root
      - DB_PASS=rootpassword
      # API key para proteger endpoints (déjalo vacío para desactivar)
      - API_KEY=

networks:
  stm_network:
    driver: bridge

volumes:
  php_sessions:
    driver: local
